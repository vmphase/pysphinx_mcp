name: Bug Report
description: Report broken logic or unexpected behavior
labels: ["bug: unconfirmed"]
body:
    - type: textarea
      id: summary
      attributes:
          label: Problem Summary
          description: A clear and concise description of what the bug is.
          placeholder: "e.g., search_docs returns no results even though the page contains the query term"
      validations:
          required: true
    - type: textarea
      id: reproduction
      attributes:
          label: Minimal Reproducible Example
          description: Provide a small, self-contained code snippet or MCP request that demonstrates the issue.
          render: python
          placeholder: |
              from pysphinx_mcp import ...
              # Your code here
      validations:
          required: true
    - type: input
      id: docs_site
      attributes:
          label: Sphinx docs site (base_url)
          description: The documentation site you were browsing, reading, or searching when the bug occurred.
          placeholder: "e.g., https://docs.python.org/3/"
      validations:
          required: true
    - type: dropdown
      id: os
      attributes:
          label: Operating System
          options:
              - Linux
              - Windows
              - macOS
      validations:
          required: true
    - type: dropdown
      id: python_version
      attributes:
          label: Python Version
          options:
              - "3.12"
              - "3.13"
              - "3.14"
      validations:
          required: true
    - type: input
      id: package_version
      attributes:
          label: pysphinx_mcp Version
          placeholder: "e.g., v0.1.0"
      validations:
          required: true
    - type: checkboxes
      id: checklist
      attributes:
          label: Preliminary Checks
          options:
              - label: I have verified I am on the latest version of pysphinx_mcp.
                required: true
              - label: I have checked existing issues to ensure this isn't a duplicate.
                required: true
