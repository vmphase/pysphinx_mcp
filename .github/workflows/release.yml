name: PyPI Release

on:
    release:
        types: [published]

jobs:
    build:
        permissions:
            contents: read
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  persist-credentials: false

            - name: Setup Python
              uses: actions/setup-python@v7
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Install build frontend
              run: python3 -m pip install build twine --user

            - name: Build sdist & wheel
              run: python3 -m build

            - name: Check distributions
              run: python3 -m twine check --strict dist/*

            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: dist/
                  if-no-files-found: error
                  retention-days: 1

    publish:
        name: Publish to PyPI
        needs: [build]
        runs-on: ubuntu-latest
        timeout-minutes: 15

        environment:
            name: pypi
            url: https://pypi.org/project/pysphinx_mcp/

        permissions:
            id-token: write
            attestations: write
            contents: read

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist/

            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@v4.1.1
              with:
                  subject-path: "dist/*"

            - name: Push to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  print-hash: true
