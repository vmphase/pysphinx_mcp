name: Pull Request Governance

on:
    workflow_dispatch:
    pull_request_target:
        types: [opened, synchronize, reopened, edited, ready_for_review]
concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true
jobs:
    semtitle:
        name: Check Semantic Title
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            pull-requests: read
        steps:
            - name: Check Semantic Title
              uses: amannn/action-semantic-pull-request@v6.1.1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    template-check:
        name: Check PR Template
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            pull-requests: write
            issues: write
        if: github.actor != 'renovate[bot]'
        steps:
            - name: Checkout base branch
              uses: actions/checkout@v7
              with:
                  persist-credentials: false
            - name: Enforce Template
              uses: actions/github-script@v9
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const path = require('path');
                      const script = require(path.resolve('.github/scripts/template-check.js'));
                      await script({ github, context, core });

    auto-apply-tags:
        name: Auto-apply Tags
        runs-on: ubuntu-latest
        needs: [template-check]
        timeout-minutes: 15
        permissions:
            pull-requests: write
            issues: write
        if: |
            always() &&
            (needs.template-check.result == 'success' || needs.template-check.result == 'skipped')
        steps:
            - name: Checkout base branch
              uses: actions/checkout@v7
              with:
                  persist-credentials: false
            - name: Auto-apply tag
              uses: actions/github-script@v9
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const path = require('path');
                      const script = require(path.resolve('.github/scripts/auto-tags.js'));
                      await script({ github, context, core });