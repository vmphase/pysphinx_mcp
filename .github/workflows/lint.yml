name: Autoformat with Ruff

on:
    pull_request:
        types: [opened, synchronize]
    workflow_dispatch:
concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true
jobs:
    format:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: |
            github.event.pull_request.head.repo.full_name == github.repository
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  ref: ${{ github.head_ref }}

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Install ruff
              run: pip install -U ruff==0.15.22

            - name: Run ruff format
              run: ruff format . --exclude docs/

            - name: Run ruff lint fixes
              run: ruff check --fix . --exclude docs/

            - name: Commit and push changes
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A

                  if ! git diff --cached --quiet; then
                    git commit -m "format(ruff) [ci skip]"
                    git show HEAD
                    git push
                  else
                    echo "No changes required"
                  fi

    lint-check:
        permissions:
            contents: read
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: |
            github.event.pull_request.head.repo.full_name != github.repository
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Install ruff
              run: pip install ruff==0.15.22

            - name: Check ruff formatting
              run: ruff format --check . --exclude docs/

            - name: Check ruff lint
              run: ruff check . --exclude docs/
